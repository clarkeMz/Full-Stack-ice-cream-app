<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scoops & Smiles{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="{{ url_for('home') }}">Scoops & Smiles</a>
            <div class="nav-links">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('flavors') }}">Flavors</a>
                <a href="{{ url_for('flavor_of_the_week') }}">Weekly</a>
                <a href="{{ url_for('order') }}">Order</a>
                <a href="{{ url_for('reviews') }}">Reviews</a>
                <a href="{{ url_for('contact') }}">Contact</a>
                <a href="{{ url_for('admin') }}">Admin</a>
                <a href="{{ url_for('about') }}">About</a>
            </div>
        </nav>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Made with Flask, HTML, CSS, JSON data files, GET routes, and POST forms.</p>
    </footer>
</body>
</html>
